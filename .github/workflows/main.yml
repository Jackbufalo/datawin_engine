name: NBA Data Update

on:
  schedule:
    # 3:00 AM MX (9:00 UTC)
    - cron: '0 9 * * *' 
    # 1:00 PM / 13:00 hrs MX (19:00 UTC)
    - cron: '0 19 * * *' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: main # Forzamos que baje la última versión de la rama principal

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 1. Update Raw Stats
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SPORT_DATA_IO_KEY: ${{ secrets.SPORT_DATA_IO_KEY }}
        run: python stats_feeder.py

      - name: 2. Refresh Team Indices
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python data_refresher.py

      - name: 3. Generate Daily Predictions
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SPORT_DATA_IO_KEY: ${{ secrets.SPORT_DATA_IO_KEY }}
        run: python datawin_final.py
