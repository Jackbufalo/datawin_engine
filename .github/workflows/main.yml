name: DataWin Engine Daily Run

on:
  schedule:
    - cron: '0 14 * * *' # Corre a las 8:00 AM CDMX
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv supabase postgrest
      - name: Run DataWin Engine
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SPORTS_API_KEY: ${{ secrets.SPORTS_API_KEY }}
        run: |
          python stats_feeder.py
          python data_refresher.py
          python daily_fixtures.py
