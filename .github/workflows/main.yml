name: NBA Data Update

on:
  schedule:
    - cron: '0 9 * * *' # 3:00 AM MX
    - cron: '0 19 * * *' # 1:00 PM MX
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # Actualizado a 3.10 para evitar avisos de Google

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai supabase requests pandas scipy numpy

      - name: 1. Update Raw Stats
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SPORT_DATA_IO_KEY: ${{ secrets.SPORT_DATA_IO_KEY }}
        run: python stats_feeder.py

      - name: 2. Refresh Team Indices
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python data_refresher.py

      - name: 3. Generate Daily Predictions
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SPORT_DATA_IO_KEY: ${{ secrets.SPORT_DATA_IO_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python datawin_final.py

      - name: 4. Send Telegram Notification
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            MSG="✅ *DataWin Pro: Éxito*%0AEl análisis de la NBA se completó correctamente. 🏀"
          else
            MSG="❌ *DataWin Pro: Error*%0AHubo un fallo en el proceso. Revisa los logs en GitHub. ⚠️"
          fi
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage" \
            -d "chat_id=$TELEGRAM_CHAT_ID" \
            -d "text=$MSG" \
            -d "parse_mode=Markdown"