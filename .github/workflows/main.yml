name: DataWin Engine Daily Run

on:
  schedule:
    - cron: '0 14 * * *' # 8:00 AM CDMX
  workflow_dispatch: # Esto permite darle al botón "Run" manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv supabase postgrest

      - name: Run DataWin Engine
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SPORT_DATA_IO_KEY: ${{ secrets.SPORT_DATA_IO_KEY }}
        run: |
          python stats_feeder.py
          python data_refresher.py
          python daily_fixtures.py